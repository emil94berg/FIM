name: PR Server Build and Tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master
      - dev
    paths:
      - FIM.Server/**
      - FIM.Server.Tests/**
      - FIM.slnx

concurrency:
  group: server-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  print-runtime-context:
    runs-on: ubuntu-latest
    steps:
      - name: Start build process
        run: echo "Build process has started."

      - name: Show runtime context
        run: |
          echo "Runner OS: ${{ runner.os }}"
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Run number: ${{ github.run_number }}"
          echo "Branch ref: ${{ github.ref }}"
          echo "Base branch: ${{ github.base_ref }}"
          echo "Head branch: ${{ github.head_ref }}"

  build-test-server:
    runs-on: ubuntu-latest
    needs: print-runtime-context

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true

      - name: Restore
        run: dotnet restore FIM.slnx

      - name: Build
        run: dotnet build FIM.slnx --configuration Release --no-restore

      - name: Run tests
        run: |
          dotnet test FIM.Server.Tests/FIM.Server.Tests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=detailed" \
            --results-directory ./TestResults

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: ./TestResults

      - name: Parse test results
        if: always()
        id: test-results
        shell: bash
        run: |
          FILE=$(find ./TestResults -name "test-results.trx" | head -n 1 || true)
          if [ -n "$FILE" ] && [ -f "$FILE" ]; then
            TOTAL=$(grep -o 'total="[0-9]*"' "$FILE" | grep -o '[0-9]*' | head -1)
            PASSED=$(grep -o 'passed="[0-9]*"' "$FILE" | grep -o '[0-9]*' | head -1)
            FAILED=$(grep -o 'failed="[0-9]*"' "$FILE" | grep -o '[0-9]*' | head -1)
            echo "total=${TOTAL:-0}" >> $GITHUB_OUTPUT
            echo "passed=${PASSED:-0}" >> $GITHUB_OUTPUT
            echo "failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          else
            echo "total=0" >> $GITHUB_OUTPUT
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
          fi

      - name: Send results to Discord
        if: always() && github.event_name == 'pull_request' && env.DISCORD_WEBHOOK_URL != ''
        uses: stegzilla/discord-notify@v4
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          webhook_url: ${{ env.DISCORD_WEBHOOK_URL }}
          title: Test Results
          message: |
            Total Tests: ${{ steps.test-results.outputs.total }}
            Passed: ${{ steps.test-results.outputs.passed }}
            Failed: ${{ steps.test-results.outputs.failed }}

            PR: ${{ github.event.pull_request.html_url }}
            Branch: ${{ github.head_ref }} -> ${{ github.base_ref }}
          colour: ${{ steps.test-results.outputs.failed == '0' && '#00FF00' || '#FF0000' }}
          username: ${{ github.event.pull_request.user.login || github.actor }}
          avatar_url: ${{ github.event.pull_request.user.avatar_url || format('https://github.com/{0}.png', github.actor) }}